services:
  - type: web
    name: permanentunderclass-web
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: checksPass
    healthCheckPath: /up
    maxShutdownDelaySeconds: 120
    preDeployCommand: bin/render-release
    envVars:
      - key: APP_HOST
        value: permanentunderclass.me
      - key: FORCE_SSL
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_ENV
        value: production
      - key: ACTIVE_STORAGE_SERVICE
        value: r2
      - key: DATABASE_URL
        fromDatabase:
          name: permanentunderclass-db
          property: connectionString
      - key: MAILER_FROM
        value: noreply@mail.permanentunderclass.me
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MAX_THREADS
        value: "5"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_DOMAIN
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false

  - type: worker
    name: permanentunderclass-worker
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: checksPass
    dockerCommand: bin/worker
    maxShutdownDelaySeconds: 120
    envVars:
      - key: APP_HOST
        value: permanentunderclass.me
      - key: FORCE_SSL
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_ENV
        value: production
      - key: ACTIVE_STORAGE_SERVICE
        value: r2
      - key: DATABASE_URL
        fromDatabase:
          name: permanentunderclass-db
          property: connectionString
      - key: JOB_CONCURRENCY
        value: "1"
      - key: MAILER_FROM
        value: noreply@mail.permanentunderclass.me
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MAX_THREADS
        value: "5"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_DOMAIN
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false

databases:
  - name: permanentunderclass-db
    databaseName: permanent_underclass_production
    user: permanent_underclass
