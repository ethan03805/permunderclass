name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: "true"
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/permanent_underclass_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/permanent_underclass_test
      PARALLEL_WORKERS: "1"
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version-file: .ruby-version

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libpq-dev libyaml-dev

      - name: Prepare database
        run: bin/setup

      - name: Run tests
        run: bin/test

      - name: Run lint
        run: bin/lint

      - name: Run security checks
        run: bin/security

      - name: Smoke test worker startup
        run: timeout 5 bin/worker || test $? -eq 124

      - name: Verify Docker build
        run: docker build .
