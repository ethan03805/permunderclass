services:
  app:
    build:
      context: .
    command: bin/dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/permanent_underclass_development
      RAILS_ENV: development
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/permanent_underclass_test
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle

  worker:
    build:
      context: .
    command: bin/worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/permanent_underclass_development
      RAILS_ENV: development
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/permanent_underclass_test
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  bundle:
  postgres-data:
